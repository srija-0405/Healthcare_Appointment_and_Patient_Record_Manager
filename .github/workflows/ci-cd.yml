
name: CI-CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            echo "package.json found. Installing dependencies..."
            npm ci
          else
            echo "No package.json found. Skipping install."
          fi

      - name: Run linting
        run: |
          if [ -f package.json ]; then
            npm run lint || echo "Lint failed or not configured."
          else
            echo "Skipping linting."
          fi

      - name: Run tests
        run: |
          if [ -f package.json ]; then
            npm test || echo "Tests failed or not configured."
          else
            echo "Skipping tests."
          fi

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: junit.xml
          if-no-files-found: ignore

      - name: Run code coverage
        run: |
          if [ -f package.json ]; then
            npm run test:coverage || echo "Coverage failed or not configured."
          else
            echo "Skipping code coverage."
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: ignore

      - name: Run security audit
        run: |
          if [ -f package.json ]; then
            npm audit --audit-level=high || echo "Audit failed."
          else
            echo "Skipping security audit."
          fi

  deploy-artifact:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: artifacts/coverage-report
          if-no-files-found: ignore

      - name: Create deployment artifact
        run: |
          mkdir deployment
          cp -r src/ deployment/src
          cp -r tests/ deployment/tests || echo "No tests folder found, skipping."
          cp -r artifacts/ deployment/reports || echo "No reports found, skipping."
          cp README.md deployment/ || echo "No README.md found, skipping."
          zip -r deployment-package.zip ./deployment

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: deployment-package.zip